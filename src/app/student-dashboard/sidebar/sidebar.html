<aside class="sidebar-container">
  <div class="brand-section">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 6C4 4.89543 4.89543 4 6 4H18C19.1046 4 20 4.89543 20 6V10H4V6Z" fill="var(--color-primary-light)" opacity="0.4"/>
        <path d="M4 10H20V18C20 19.1046 19.1046 20 18 20H6C4.89543 20 4 19.1046 4 18V10Z" fill="var(--color-primary)"/>
        <circle cx="12" cy="7" r="1.5" fill="white"/>
      </svg>
    </div>
    <span class="brand-text"><strong>Practical</strong>Hub</span>
  </div>

  <div class="profile-summary">
    <div class="avatar">{{ userInitials }}</div>
    <div class="profile-text">
      <span class="name">{{ userName }}</span>
      <span class="details">{{ userDetails }}</span>
    </div>
  </div>

  <div class="nav-section">
    <span class="section-label">MAIN</span>

    <a class="nav-item" routerLink="/student/home" routerLinkActive="active" (click)="setActive('Home')">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      <span class="label">Home</span>
    </a>

    <a class="nav-item" routerLink="/student/Practicals" routerLinkActive="active" (click)="setActive('Practicals')">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <circle cx="9" cy="9" r="1"></circle>
      </svg>
      <span class="label">Practicals</span>
      <span class="badge">2</span>
    </a>

    <a class="nav-item" routerLink="/student/solve" routerLinkActive="active" (click)="setActive('Solve')">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
      <span class="label">Solve</span>
    </a>

    <a class="nav-item" routerLink="/student/results" routerLinkActive="active" (click)="setActive('Results')">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
      <span class="label">Results</span>
    </a>
  </div>

  <div class="nav-section">
    <span class="section-label">ACCOUNT</span>
    <a class="nav-item" routerLink="/student/profile" routerLinkActive="active" (click)="setActive('Profile')">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span class="label">Profile</span>
    </a>
  </div>

  <div class="spacer"></div>

  <a class="nav-item sign-out">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
      <polyline points="16 17 21 12 16 7"></polyline>
      <line x1="21" y1="12" x2="9" y2="12"></line>
    </svg>
    <span class="label">Sign out</span>
  </a>
</aside>
